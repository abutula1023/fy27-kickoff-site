name: Keep Streamlit App Awake

on:
  schedule:
    - cron: "17 */4 * * *"
  workflow_dispatch:

concurrency:
  group: keep-streamlit-awake
  cancel-in-progress: true

jobs:
  keep-awake:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Install Playwright and Chromium
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install "playwright==1.54.0"
          python3 -m playwright install --with-deps chromium

      - name: Open and validate Streamlit app
        run: |
          python3 - <<'PY'
          import re
          from playwright.sync_api import sync_playwright

          app_url = "https://csp-fy27-kickoff.streamlit.app/"
          screenshot_path = "streamlit-failure.png"

          with sync_playwright() as playwright:
              browser = playwright.chromium.launch(headless=True)
              page = browser.new_page(viewport={"width": 1440, "height": 1000})

              try:
                  print(f"Opening {app_url}")
                  response = page.goto(
                      app_url,
                      wait_until="domcontentloaded",
                      timeout=120000,
                  )

                  if response:
                      print(f"Initial HTTP status: {response.status}")

                  page.wait_for_timeout(10000)

                  wake_button = page.get_by_text(
                      re.compile(r"get this app back up", re.IGNORECASE)
                  )
                  if wake_button.count() > 0:
                      print("Sleeping app detected. Clicking wake-up button.")
                      wake_button.first.click()

                  heading = page.get_by_role(
                      "heading",
                      name=re.compile(r"FY27 Kickoff", re.IGNORECASE),
                  )
                  heading.first.wait_for(state="visible", timeout=120000)
                  page.wait_for_timeout(15000)

                  print(f"Final page title: {page.title()}")
                  print(f"Final URL: {page.url}")
                  print("Streamlit app rendered successfully.")
              except Exception:
                  page.screenshot(path=screenshot_path, full_page=True)
                  raise
              finally:
                  browser.close()
          PY

      - name: Upload failure screenshot
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: streamlit-failure
          path: streamlit-failure.png
          if-no-files-found: ignore
          retention-days: 3
