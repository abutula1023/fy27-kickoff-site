name: Keep Streamlit App Awake

on:
  schedule:
    # Every 4 hours at minute 17, using UTC
    - cron: "17 */4 * * *"
  workflow_dispatch:

concurrency:
  group: keep-streamlit-awake
  cancel-in-progress: true

jobs:
  keep-awake:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python